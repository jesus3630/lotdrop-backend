name: CI — LotDrop Backend

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test --if-present

      - name: Build check
        run: npm run build --if-present

  notify-failure:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: test
    if: failure()
    steps:
      - name: Notify Mission Control
        run: |
          curl -s -X POST "${{ secrets.MISSION_CONTROL_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d '{"project":"LotDrop","status":"failing","branch":"${{ github.ref_name }}","commit":"${{ github.sha }}"}'
        continue-on-error: true
